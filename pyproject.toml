[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = [
  "B",   # flake8-bugbear
  "E",   # pycodestyle errors
  "F",   # Pyflakes
  "I",   # isort
  "SIM", # flake8-simplify
  "UP",  # pyupgrade
  "W",   # pycodestyle warnings
]
ignore = [
  "E501", # Let the formatter handle wrapping; avoid awkward long string rewrites.
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
